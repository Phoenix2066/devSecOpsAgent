services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: anvil
      POSTGRES_PASSWORD: anvil
      POSTGRES_DB: devsecops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/anvilpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:
